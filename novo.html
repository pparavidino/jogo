<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape from My Heart ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #14002e, #050010);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}

canvas {
  border-radius: 25px;
  box-shadow: 0 0 40px #ff1493;
}

#startScreen, #gameOverScreen, #loadingScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(5,0,16,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff1493, #ff69b4);
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<canvas id="game" width="1000" height="520"></canvas>

<div id="loadingScreen">
  <h1>Carregando ❤️...</h1>
</div>

<div id="startScreen" style="display:none;">
  <h1>ESCAPE FROM MY HEART ❤️</h1>
  <button onclick="startGame()">COMEÇAR</button>
</div>

<div id="gameOverScreen" style="display:none;">
  <h1>💔 Você foi pega!</h1>
  <p id="finalText"></p>
  <button onclick="startGame()">Jogar novamente</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

/* CONFIG */
const RUN_TOTAL = 5;
const JUMP_TOTAL = 3;

/* RECORDES */
let bestScore = localStorage.getItem("recorde") || 0;
let kisses = localStorage.getItem("kisses") || 0;

/* LOADING */
let imagesLoaded = 0;
const totalImages = RUN_TOTAL + JUMP_TOTAL;

const runFrames = [];
const jumpFrames = [];

function checkLoad() {
  imagesLoaded++;
  if (imagesLoaded === totalImages) {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "flex";
  }
}

for (let i = 1; i <= RUN_TOTAL; i++) {
  const img = new Image();
  img.onload = checkLoad;
  img.src = "run" + i + ".png";
  runFrames.push(img);
}

for (let i = 1; i <= JUMP_TOTAL; i++) {
  const img = new Image();
  img.onload = checkLoad;
  img.src = "jump" + i + ".png";
  jumpFrames.push(img);
}

let frameIndex = 0;
let frameTimer = 0;

/* PLAYER */
let playerY = 340;
let velocity = 0;
let gravity = 0.9;
let isJumping = false;

const playerHitbox = {
  x: 90,
  width: 60,
  height: 100
};

/* GAME */
let hearts = [];
let score = 0;
let gameSpeed = 5;
let gameRunning = false;

let spawnTimer = 0;
let spawnInterval = 90;

/* PLAYER */
function drawPlayer() {
  frameTimer++;

  let currentFrame;

  if (isJumping) {
    const jumpIndex = Math.min(2, Math.floor(frameTimer / 6));
    currentFrame = jumpFrames[jumpIndex];
  } else {
    if (frameTimer % 6 === 0) {
      frameIndex = (frameIndex + 1) % RUN_TOTAL;
    }
    currentFrame = runFrames[frameIndex];
  }

  ctx.drawImage(currentFrame, 70, playerY - 110, 100, 140);
}

/* CORAÇÃO */
function drawHeart(x, y) {
  ctx.font = "38px Arial";
  ctx.fillText("❤️", x, y);
}

/* UPDATE */
function update() {
  if (!gameRunning) return;

  score++;
  spawnTimer++;

  velocity += gravity;
  playerY += velocity;

  if (playerY >= 340) {
    playerY = 340;
    velocity = 0;
    isJumping = false;
  }

  if (spawnTimer > spawnInterval) {
    hearts.push({
      x: canvas.width,
      y: Math.random() * 200 + 100
    });
    spawnTimer = 0;
  }

  hearts.forEach(h => h.x -= gameSpeed);

  hearts = hearts.filter(h => {

    if (
      h.x < playerHitbox.x + playerHitbox.width &&
      h.x > playerHitbox.x &&
      h.y > playerY - playerHitbox.height &&
      h.y < playerY
    ) {
      // 💋 AGORA É ACUMULATIVO
      kisses++;
      localStorage.setItem("kisses", kisses);

      gameRunning = false;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("recorde", bestScore);
      }

      showGameOver();
    }

    return h.x > -50;
  });

  if (score % 500 === 0) {
    gameSpeed += 0.3;
    spawnInterval = Math.max(50, spawnInterval - 5);
  }
}

/* DRAW */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPlayer();
  hearts.forEach(h => drawHeart(h.x, h.y));

  ctx.fillStyle = "#fff";
  ctx.font = "18px Arial";
  ctx.fillText("Distância: " + Math.floor(score / 5), 20, 30);
  ctx.fillText("Recorde: " + Math.floor(bestScore / 5), 20, 55);
  ctx.fillText("Beijos devidos: " + kisses + " 💋", 20, 80);
}

/* GAME OVER */
function showGameOver() {
  document.getElementById("finalText").innerText =
    "Distância: " + Math.floor(score / 5) + "m\n" +
    "Recorde: " + Math.floor(bestScore / 5) + "m\n\n" +
    "Total da divida de beijos: " + kisses + " 💋";

  document.getElementById("gameOverScreen").style.display = "flex";
}

/* CONTROLES */
function jump() {
  if (!isJumping && gameRunning) {
    velocity = -17;
    isJumping = true;
    frameTimer = 0;
  }
}

window.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

canvas.addEventListener("click", jump);

/* START */
function startGame() {
  if (imagesLoaded < totalImages) return;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";

  hearts = [];
  score = 0;
  playerY = 340;
  velocity = 0;
  frameIndex = 0;
  frameTimer = 0;
  gameSpeed = 5;
  spawnInterval = 90;

  gameRunning = true;
}

/* LOOP */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
