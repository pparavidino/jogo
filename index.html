<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape from My Heart ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #14002e, #050010);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}

canvas {
  border-radius: 25px;
  box-shadow: 0 0 40px #ff1493;
}

#startScreen, #gameOverScreen, #loadingScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(5,0,16,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff1493, #ff69b4);
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="loadingScreen">
<h1>Carregando ❤️...</h1>
</div>

<div id="startScreen" style="display:none;">
<h1>ESCAPE FROM MY HEART ❤️</h1>
<button onclick="startGame()">COMEÇAR</button>
</div>

<div id="gameOverScreen" style="display:none;">
<h1>💔 Você foi pega!</h1>
<p id="finalText"></p>
<button onclick="startGame()">Jogar novamente</button>
</div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

/* RESPONSIVO */
const baseWidth = 1000;
const baseHeight = 520;
let scale = 1;

function resizeCanvas(){
const scaleX = window.innerWidth / baseWidth;
const scaleY = window.innerHeight / baseHeight;

scale = Math.min(scaleX, scaleY);

canvas.width = baseWidth * scale;
canvas.height = baseHeight * scale;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* SONS */
const jumpSound = new Audio("jump.mp3");
const hitSound = new Audio("hit.mp3");
const powerSound = new Audio("powerup.mp3");

/* CONFIG */
const RUN_TOTAL = 5;
const JUMP_TOTAL = 3;

/* FRASES */
const frases = [
"Você não consegue fugir de mim ❤️",
"Mais um beijo 😌",
"Corre mas não foge 💕",
"Te peguei 😏",
"Só mais um beijinho 💋"
];

/* RECORDES */
let bestScore = localStorage.getItem("recorde") || 0;
let kisses = localStorage.getItem("kisses") || 0;

/* PARTICULAS */
let particles = [];

function createParticles(x,y){
for(let i=0;i<10;i++){
particles.push({
x,
y,
vx:Math.random()*4-2,
vy:Math.random()*-3,
life:30
})
}
}

/* POWERUPS */
let shield=false;
let powerups=[];

/* LOADING */
let imagesLoaded=0;
const totalImages=RUN_TOTAL+JUMP_TOTAL;

const runFrames=[];
const jumpFrames=[];

function checkLoad(){
imagesLoaded++;
if(imagesLoaded===totalImages){
document.getElementById("loadingScreen").style.display="none";
document.getElementById("startScreen").style.display="flex";
}
}

for(let i=1;i<=RUN_TOTAL;i++){
const img=new Image();
img.onload=checkLoad;
img.src="run"+i+".png";
runFrames.push(img);
}

for(let i=1;i<=JUMP_TOTAL;i++){
const img=new Image();
img.onload=checkLoad;
img.src="jump"+i+".png";
jumpFrames.push(img);
}

let frameIndex=0;
let frameTimer=0;

/* PLAYER */
let playerY=340;
let velocity=0;
let gravity=0.9;
let isJumping=false;

const playerHitbox={
x:90,
width:60,
height:100
};

/* GAME */
let hearts=[];
let score=0;
let gameSpeed=5;
let gameRunning=false;

let spawnTimer=0;
let spawnInterval=90;

/* PLAYER */
function drawPlayer(){

frameTimer++;

let bounce=Math.sin(frameTimer*0.1)*2;

let currentFrame;

if(isJumping){
const jumpIndex=Math.min(2,Math.floor(frameTimer/6));
currentFrame=jumpFrames[jumpIndex];
}else{
if(frameTimer%6===0){
frameIndex=(frameIndex+1)%RUN_TOTAL;
}
currentFrame=runFrames[frameIndex];
}

ctx.drawImage(
currentFrame,
70*scale,
(playerY-110+bounce)*scale,
100*scale,
140*scale
);
}

/* CORAÇÃO */
function drawHeart(x,y){
ctx.font=(38*scale)+"px Arial";
ctx.fillText("❤️",x*scale,y*scale);
}

/* UPDATE */
function update(){

if(!gameRunning)return;

score++;
spawnTimer++;

velocity+=gravity;
playerY+=velocity;

if(playerY>=340){
playerY=340;
velocity=0;
isJumping=false;
}

/* spawn coração */
if(spawnTimer>spawnInterval){
hearts.push({
x:baseWidth,
y:Math.random()*200+100
});
spawnTimer=0;
}

/* spawn powerup */
if(Math.random()<0.003){
powerups.push({
x:baseWidth,
y:Math.random()*200+100
});
}

hearts.forEach(h=>h.x-=gameSpeed);
powerups.forEach(p=>p.x-=gameSpeed);

/* colisão coração */
hearts=hearts.filter(h=>{

if(
h.x<playerHitbox.x+playerHitbox.width &&
h.x>playerHitbox.x &&
h.y>playerY-playerHitbox.height &&
h.y<playerY
){

if(shield){
shield=false;
return false;
}

hitSound.play();
createParticles(playerHitbox.x,playerY);

kisses++;
localStorage.setItem("kisses",kisses);

gameRunning=false;

if(score>bestScore){
bestScore=score;
localStorage.setItem("recorde",bestScore);
}

showGameOver();
}

return h.x>-50;
});

/* colisão powerup */
powerups=powerups.filter(p=>{

if(
p.x<playerHitbox.x+playerHitbox.width &&
p.x>playerHitbox.x &&
p.y>playerY-playerHitbox.height &&
p.y<playerY
){
shield=true;
powerSound.play();
return false;
}

return p.x>-50;
});

/* partículas */
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
});

particles=particles.filter(p=>p.life>0);

if(score%500===0){
gameSpeed+=0.3;
spawnInterval=Math.max(50,spawnInterval-5);
}

}

/* DRAW */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawPlayer();

hearts.forEach(h=>drawHeart(h.x,h.y));

powerups.forEach(p=>{
ctx.font=(30*scale)+"px Arial";
ctx.fillText("🛡️",p.x*scale,p.y*scale);
});

particles.forEach(p=>{
ctx.fillStyle="#ff69b4";
ctx.fillRect(p.x*scale,p.y*scale,4,4);
});

ctx.fillStyle="#fff";
ctx.font=(18*scale)+"px Arial";

ctx.fillText("Distância: "+Math.floor(score/5),20*scale,30*scale);
ctx.fillText("Recorde: "+Math.floor(bestScore/5),20*scale,55*scale);
ctx.fillText("Beijos: "+kisses+" 💋",20*scale,80*scale);

if(shield){
ctx.fillText("🛡️ ESCUDO",20*scale,105*scale);
}

}

/* GAME OVER */
function showGameOver(){

const frase=frases[Math.floor(Math.random()*frases.length)];

document.getElementById("finalText").innerText=
frase+"\n\n"+
"Distância: "+Math.floor(score/5)+"m\n"+
"Beijos devidos: "+kisses+" 💋";

document.getElementById("gameOverScreen").style.display="flex";
}

/* CONTROLES */
function jump(){
if(!isJumping && gameRunning){
velocity=-17;
isJumping=true;
frameTimer=0;
jumpSound.play();
}
}

window.addEventListener("keydown",e=>{
if(e.code==="Space")jump();
});

window.addEventListener("touchstart",jump);
canvas.addEventListener("click",jump);

/* START */
function startGame(){

if(imagesLoaded<totalImages)return;

document.getElementById("startScreen").style.display="none";
document.getElementById("gameOverScreen").style.display="none";

hearts=[];
score=0;
playerY=340;
velocity=0;
frameIndex=0;
frameTimer=0;
gameSpeed=5;
spawnInterval=90;

gameRunning=true;
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
